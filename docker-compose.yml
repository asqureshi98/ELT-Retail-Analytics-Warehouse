x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://retail_user:retail_password@postgres:5432/retail_warehouse
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: retail_warehouse
    POSTGRES_USER: retail_user
    POSTGRES_PASSWORD: retail_password
    DBT_PROFILES_DIR: /opt/airflow/project/dbt/retail_warehouse
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./:/opt/airflow/project
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: retail_postgres
    environment:
      POSTGRES_DB: retail_warehouse
      POSTGRES_USER: retail_user
      POSTGRES_PASSWORD: retail_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./warehouse/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_user -d retail_warehouse"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: retail_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        pip install --no-cache-dir -r /opt/airflow/project/requirements.txt dbt-core==1.8.2 dbt-postgres==1.8.2
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Retail \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin || true

  airflow-webserver:
    <<: *airflow-common
    container_name: retail_airflow_webserver
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/project/requirements.txt dbt-core==1.8.2 dbt-postgres==1.8.2 && airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: retail_airflow_scheduler
    command: >
      bash -c "pip install --no-cache-dir -r /opt/airflow/project/requirements.txt dbt-core==1.8.2 dbt-postgres==1.8.2 && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  metabase:
    image: metabase/metabase:latest
    container_name: retail_metabase
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  metabase_data:
