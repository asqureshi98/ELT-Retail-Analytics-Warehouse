<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="620" viewBox="0 0 1120 620" role="img" aria-labelledby="title desc">
  <title id="title">Dimensional Model Overview</title>
  <desc id="desc">Facts and dimensions in the marts schema.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0f766e"/></marker>
    <style>
      text {font-family: Inter, Arial, sans-serif; fill:#0f172a;}
      .fact {fill:#fff7ed; stroke:#ea580c; stroke-width:2; rx:12;}
      .dim {fill:#ecfeff; stroke:#0891b2; stroke-width:2; rx:12;}
      .label {font-size:16px; font-weight:700;}
      .small {font-size:12px; fill:#475569;}
      .line {stroke:#0f766e; stroke-width:2; marker-end:url(#arrow); fill:none; opacity:.8;}
    </style>
  </defs>
  <rect width="1120" height="620" fill="#ffffff"/>
  <text x="40" y="44" style="font-size:24px;font-weight:700;">Marts Dimensional Model Overview</text>

  <rect x="70" y="95" width="175" height="72" class="dim"/><text x="102" y="124" class="label">dim_customers</text><text x="103" y="148" class="small">customer attributes</text>
  <rect x="70" y="220" width="175" height="72" class="dim"/><text x="108" y="249" class="label">dim_products</text><text x="107" y="273" class="small">category, brand, margin</text>
  <rect x="70" y="345" width="175" height="72" class="dim"/><text x="118" y="374" class="label">dim_stores</text><text x="104" y="398" class="small">channel + location</text>
  <rect x="70" y="470" width="175" height="72" class="dim"/><text x="98" y="499" class="label">dim_promotions</text><text x="103" y="523" class="small">discounts + dates</text>

  <rect x="470" y="80" width="190" height="76" class="fact"/><text x="528" y="111" class="label">fct_sales</text><text x="510" y="136" class="small">one row per order</text>
  <rect x="470" y="190" width="190" height="76" class="fact"/><text x="505" y="221" class="label">fct_order_items</text><text x="500" y="246" class="small">one row per order item</text>
  <rect x="470" y="300" width="190" height="76" class="fact"/><text x="520" y="331" class="label">fct_payments</text><text x="507" y="356" class="small">one row per payment</text>
  <rect x="470" y="410" width="190" height="76" class="fact"/><text x="525" y="441" class="label">fct_returns</text><text x="511" y="466" class="small">one row per return</text>
  <rect x="470" y="520" width="190" height="76" class="fact"/><text x="485" y="551" class="label">fct_inventory</text><text x="493" y="576" class="small">product/store snapshot</text>

  <rect x="875" y="160" width="175" height="72" class="dim"/><text x="916" y="189" class="label">dim_date</text><text x="906" y="213" class="small">calendar spine</text>

  <path d="M245 131 C340 131 370 118 470 118" class="line"/>
  <path d="M245 256 C345 256 370 228 470 228" class="line"/>
  <path d="M245 381 C345 381 375 558 470 558" class="line"/>
  <path d="M245 506 C345 506 375 118 470 118" class="line"/>
  <path d="M660 118 C760 118 790 196 875 196" class="line"/>
  <path d="M660 228 C760 228 790 196 875 196" class="line"/>
  <path d="M660 448 C760 448 790 196 875 196" class="line"/>
  <path d="M245 256 C345 256 375 228 470 228" class="line"/>
  <path d="M245 381 C350 381 376 118 470 118" class="line"/>
  <path d="M245 256 C350 256 376 558 470 558" class="line"/>

  <text x="40" y="590" class="small">Simplified view: dimensions connect to facts where keys are present. Detailed columns and tests live in dbt/retail_warehouse/models.</text>
</svg>
