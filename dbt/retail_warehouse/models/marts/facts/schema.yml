version: 2

models:
  - name: fct_sales
    description: "Order-grain fact table with payment and return summary attributes."
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique
      - name: customer_id
        data_tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: store_id
        data_tests:
          - relationships:
              to: ref('dim_stores')
              field: store_id
      - name: order_date_day
        data_tests:
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: promotion_id
        data_tests:
          - relationships:
              to: ref('dim_promotions')
              field: promotion_id
              config:
                where: "promotion_id is not null"
      - name: order_status
        data_tests:
          - accepted_values:
              values: ['completed', 'cancelled', 'returned']
      - name: payment_status
        data_tests:
          - accepted_values:
              values: ['paid', 'failed', 'refunded']
      - name: payment_method
        data_tests:
          - accepted_values:
              values: ['card', 'cash', 'wallet', 'bank_transfer']
    data_tests:
      - assert_order_total_components:
          total_col: total_amount
          subtotal_col: subtotal_amount
          discount_col: discount_amount
          tax_col: tax_amount
          shipping_col: shipping_amount
          tolerance: 0.02

  - name: fct_order_items
    description: "Order item grain fact table with enriched product and margin data."
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              to: ref('fct_sales')
              field: order_id
      - name: product_id
        data_tests:
          - relationships:
              to: ref('dim_products')
              field: product_id

  - name: fct_payments
    description: "Payment grain fact table."
    columns:
      - name: payment_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              to: ref('fct_sales')
              field: order_id
      - name: payment_status
        data_tests:
          - accepted_values:
              values: ['paid', 'failed', 'refunded']
      - name: payment_method
        data_tests:
          - accepted_values:
              values: ['card', 'cash', 'wallet', 'bank_transfer']

  - name: fct_returns
    description: "Return grain fact table."
    columns:
      - name: return_id
        data_tests:
          - not_null
          - unique
      - name: order_id
        data_tests:
          - relationships:
              to: ref('fct_sales')
              field: order_id
      - name: product_id
        data_tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: return_reason
        data_tests:
          - accepted_values:
              values: ['damaged', 'late', 'wrong_item', 'changed_mind']

  - name: fct_inventory_snapshots
    description: "Inventory snapshot grain fact table with restock flag."
    columns:
      - name: inventory_id
        data_tests:
          - not_null
          - unique
      - name: product_id
        data_tests:
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: store_id
        data_tests:
          - relationships:
              to: ref('dim_stores')
              field: store_id
