<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Retail Analytics Warehouse Architecture</title>
  <desc id="desc">Local architecture from CSV generation to PostgreSQL, dbt, Airflow, and Metabase dashboards.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/></marker>
    <style>
      text {font-family: Inter, Arial, sans-serif; fill:#0f172a;}
      .title {font-size:26px; font-weight:700;}
      .box {fill:#eff6ff; stroke:#2563eb; stroke-width:2; rx:14;}
      .service {fill:#f8fafc; stroke:#475569; stroke-width:2; rx:14;}
      .schema {fill:#ecfdf5; stroke:#059669; stroke-width:2; rx:12;}
      .small {font-size:14px;}
      .label {font-size:18px; font-weight:700;}
      .muted {font-size:13px; fill:#475569;}
      .line {stroke:#2563eb; stroke-width:2.5; marker-end:url(#arrow); fill:none;}
    </style>
  </defs>
  <rect width="1120" height="520" fill="#ffffff"/>
  <text x="40" y="48" class="title">Retail Analytics Warehouse - Local Batch ELT Architecture</text>

  <rect x="40" y="100" width="170" height="95" class="box"/>
  <text x="62" y="135" class="label">Python scripts</text>
  <text x="62" y="160" class="small">generate, validate,</text>
  <text x="62" y="181" class="small">load raw CSVs</text>

  <rect x="260" y="100" width="170" height="95" class="box"/>
  <text x="287" y="135" class="label">CSV landing</text>
  <text x="296" y="160" class="small">data/raw/</text>
  <text x="284" y="181" class="small">or /tmp in DAG</text>

  <rect x="480" y="78" width="230" height="330" class="service"/>
  <text x="525" y="113" class="label">PostgreSQL 16</text>
  <rect x="510" y="140" width="170" height="42" class="schema"/><text x="568" y="166" class="small">raw</text>
  <rect x="510" y="195" width="170" height="42" class="schema"/><text x="557" y="221" class="small">staging</text>
  <rect x="510" y="250" width="170" height="42" class="schema"/><text x="540" y="276" class="small">intermediate</text>
  <rect x="510" y="305" width="170" height="42" class="schema"/><text x="558" y="331" class="small">marts</text>
  <rect x="510" y="360" width="170" height="42" class="schema"/><text x="562" y="386" class="small">audit</text>

  <rect x="770" y="100" width="145" height="95" class="box"/>
  <text x="820" y="135" class="label">dbt</text>
  <text x="798" y="160" class="small">run + test</text>
  <text x="793" y="181" class="small">docs generate</text>

  <rect x="960" y="100" width="130" height="95" class="box"/>
  <text x="986" y="135" class="label">Metabase</text>
  <text x="984" y="160" class="small">API-provisioned</text>
  <text x="1002" y="181" class="small">dashboards</text>

  <rect x="770" y="280" width="320" height="100" class="service"/>
  <text x="872" y="316" class="label">Airflow</text>
  <text x="800" y="343" class="small">retail_batch_elt orchestrates generation,</text>
  <text x="800" y="365" class="small">validation, raw load, dbt, and docs.</text>

  <path d="M210 147 L260 147" class="line"/>
  <path d="M430 147 L480 147" class="line"/>
  <path d="M710 147 L770 147" class="line"/>
  <path d="M915 147 L960 147" class="line"/>
  <path d="M930 280 L930 220 L595 220" class="line"/>
  <path d="M930 280 L930 220 L842 220 L842 195" class="line"/>

  <text x="40" y="455" class="muted">Scope: local Docker Compose only; synthetic data; development credentials; no cloud deployment or production secret management.</text>
</svg>
